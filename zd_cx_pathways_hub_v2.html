  if(VIEW==='persona'){
    const p=PERSONAS.find(x=>x.id===activePersonaId);
    const sName=SEGS.find(s=>s.id===p.seg)?.name||'';
    if(fromSeg==='value'){
      return `<div class="breadcrumb"><span class="bc-link" onclick="goOrient()">Overview</span><span class="bc-sep">›</span><span class="bc-link" onclick="goJourney()">Value &amp; Deal Seekers — Journey</span><span class="bc-sep">›</span><span class="bc-cur">${p.title}</span></div>`;

function renderOrient(){
  const stageCards=[
    ['01','Discover','Make great travel feel like an obvious choice','First exposure to the travel offering within a trusted ZD context. A relevant option surfaces and a credible value signal draws the traveller in.',0,''],
    ['02','Plan & Compare','Simplify decisions and reduce uncertainty','The traveller researches and compares options. Clarity on inclusions, pricing, and flexibility terms determines whether confidence builds or doubt wins.',1,''],
    ['03','Book','Turn intent into confident commitment','The booking flow converts intention into a confirmed reservation. Transparency at checkout and a friction-free experience are critical to completion.',2,''],
    ['04','Pre-Trip','Keep confidence intact as the trip approaches','Proactive communication sustains confidence between booking and departure — practical preparation, supplier confirmations, and timely reminders.',3,''],
    ['05','In-Trip','Stay focused on the experience, not the logistics','In normal operations the platform is invisible — the trip simply works. Fast, accessible support is available but should rarely need to be used.',4,''],
    ['06','Disruption','Resolve issues seamlessly, if needed','When plans change unexpectedly, ZD owns the resolution. Proactive detection and managed rebooking differentiate this from standard OTA models.',5,''],
    ['07','Post-Trip','Leave travellers feeling rewarded for choosing ZD','The trip is over but the relationship continues. Timely refund confirmation, a genuine review invitation, and a well-timed next deal signal loyalty is recognised.',6,''],
  ].map(([num,name,intent,desc,pi],i,arr)=>{

      ${i<arr.length-1?'<div class="arr"><div class="arr-line"></div><div class="arr-tip"></div></div>':''}`;
  }).join('');

  const segCards=SEGS.map(s=>{

  <div class="body">
    <div class="sec-label">Journey overview — seven stages</div>
    <div class="stages-scroll"><div class="stages-row">${stageCards}</div></div>
    <div class="bp-note" style="margin-top:16px;margin-bottom:28px"><strong>Service blueprint note.</strong> Each stage is documented at two levels: an <em>experience map</em> (goals, actions, emotions, and touchpoints from the traveller's perspective) and a <em>service blueprint</em> (on-stage delivery, backstage operations, technology and systems, people, process, and supporting agreements). The disruption stage carries an additional design note on ZD's differentiation opportunity relative to standard OTA and TMC models.</div>
    <div class="sec-label">Macro segment journeys — click a persona name to view their profile directly</div>
    <div class="seg-grid">${segCards}</div>
  </div>`;
}

function renderJourney(){
  const s=JSTAGES[jStage];
  const d=JDATA[s.id];
  const isD=s.special;
  const pal=STAGE_PALETTE[jStage];
  const myP=PERSONAS.filter(p=>p.seg==='value');

  const navHtml=JSTAGES.map((st,i)=>{
    const p=STAGE_PALETTE[i];
    const isOn=i===jStage;
    return `
      <button class="spill" style="background:${isOn?p.bg:'transparent'};border-color:${isOn?p.border:'#d0cec8'};color:${isOn?p.name:'#5a5956'};font-weight:${isOn?'500':'400'}" onclick="setJStage(${i})">${st.label}</button>
      ${i<JSTAGES.length-1?'<span class="sarr">›</span>':''}`;
  }).join('');

  const emoHtml=Object.entries(d.emotions).map(([k,v])=>`
    <div class="emo-row"><span class="emo-n">${k}</span><div class="emo-tr"><div class="emo-fi" style="width:${v}%;background:${EMOCOLS[k]||'#888'}"></div></div><span class="emo-pc">${v}</span></div>
  `).join('');

  const pips=myP.map(p=>`<span class="ppip live" onclick="goPersona(${p.id},'value')" style="cursor:pointer">${p.title.replace('The ','')}</span>`).join('');

  function lane(items){return `<div style="font-size:12px;color:#3d3d3a;line-height:1.65;padding:10px 12px;background:#fff;border-radius:5px;border:0.5px solid #e0ddd6"><ul style="padding-left:14px">${items.map(x=>`<li style="margin-bottom:4px">${x}</li>`).join('')}</ul></div>`;}

  let main='';
  if(jView==='exp'){
    main=`<div class="g2">
      <div class="card"><div class="clbl">Customer goals</div><ul>${d.goals.map(g=>`<li>${g}</li>`).join('')}</ul></div>
      <div class="card"><div class="clbl">Customer actions</div><ul>${d.actions.map(a=>`<li>${a}</li>`).join('')}</ul></div>
    </div>
    <div class="card full"><div class="clbl">Key touchpoints</div><ul>${d.touchpoints.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
  } else {
    if(isD){
      main=`<div class="g2">
        <div class="card wh"><div class="lhd lf">On stage — visible to traveller</div>${lane(d.front)}</div>
        <div class="card wh"><div class="lhd lb">Backstage — operations</div>${lane(d.back)}</div>
      </div><div class="g2">
        <div class="card wh"><div class="lhd lt">Technology &amp; systems</div>${lane(d.tech)}</div>
        <div class="card wh"><div class="lhd lpr">Process &amp; playbooks</div>${lane(d.process)}</div>
      </div>
      <div class="card wh full"><div class="lhd lp">People — tiered support model</div>
        <div class="tgrid">${d.people.map((p,i)=>{
          const labs=['Tier 1','Tier 2','Tier 3'];
          const nms=['Self-service &amp; AI','General support agents','Specialist disruption'];
          const pt=p.split(':');
          return `<div class="tc"><div class="tnum">${labs[i]}</div><div class="tnm">${nms[i]}</div><div class="tds">${pt.length>1?pt[1].trim():p}</div></div>`;
        }).join('')}</div>
      </div>`;
    } else {
      main=`<div class="g2">
        <div class="card wh"><div class="lhd lf">On stage — visible to traveller</div>${lane(d.front)}</div>
        <div class="card wh"><div class="lhd lb">Backstage — operations</div>${lane(d.back)}</div>
      </div><div class="g2">
        <div class="card wh"><div class="lhd lt">Technology &amp; systems</div>${lane(d.tech)}</div>
        <div class="card wh"><div class="lhd lp">People &amp; responsibilities</div>${lane(d.people)}</div>
      </div><div class="g2">
        <div class="card wh"><div class="lhd lpr">Process &amp; standards</div>${lane(d.process)}</div>
        <div class="card wh"><div class="lhd ls">Supporting systems &amp; agreements</div>${lane(d.systems)}</div>
      </div>`;
    }
  }

  return `<div class="hdr">
    <div class="eyebrow">Value &amp; Deal Seekers</div>
    <div class="hdr-title">Customer Experience Journey</div>
    <div class="hdr-sub">RetailMeNot (US) &middot; VoucherCodes (UK) &middot; Click a persona name to view their full profile</div>
    <div class="hdr-tags" style="margin-top:10px">${pips}</div>
  </div>
  <div class="body">
    <div class="stage-nav">${navHtml}</div>
    <div class="vbar">
      <span class="vlabel">View</span>
      <button class="vbtn${jView==='exp'?' on':''}" onclick="setJView('exp')">Experience map — frontstage</button>
      <button class="vbtn${jView==='bp'?' on':''}" onclick="setJView('bp')">Service blueprint — backstage</button>
    </div>
    <div class="jbody">
      <div class="jsb">
        <div class="slabel2" style="margin-bottom:7px">Stage intent</div>
        <div class="intent-strip${isD?' disruption':''}" style="border-left-color:${pal.border};background:${pal.bg}"><div class="intent-txt" style="color:${pal.intent}">"${s.intent}"</div></div>
        <div class="slabel2" style="margin-bottom:7px">Emotional temperature</div>
        ${emoHtml}
        <div class="slabel2" style="margin-top:12px;margin-bottom:7px">Properties</div>
        <div class="si">RetailMeNot (US)</div><div class="si">VoucherCodes (UK)</div>
      </div>
      <div>
        <div class="stitle" style="color:${pal.name}">${s.label}${isD?' — Disruption Handling':''}</div>
        <div class="sdesc">${d.desc}</div>
        ${isD&&d.disruptNote?`<div class="dbox"><div class="dlbl">Design note — differentiation opportunity</div><div class="dtxt">${d.disruptNote}</div></div>`:''}
        ${main}
      </div>
    </div>
  </div>`;
}

function renderPersona(){
  const p=PERSONAS.find(x=>x.id===activePersonaId);
  if(!p) return '<div class="body"><p>Persona not found.</p></div>';
  const seg=SEGS.find(s=>s.id===p.seg);
  const mkts=p.markets.map(m=>`<span class="mkt-badge ${m==='US'?'mkt-us':'mkt-uk'}">${m}</span>`).join('');
  const pubs=[...p.pubAlignment,...p.voucherProps].map(pub=>{
    const s=PUB_STYLE[pub]||{bg:'#f1efe8',color:'#5a5956',border:'#d3d1c7'};
    return `<span class="pub-badge" style="background:${s.bg};color:${s.color};border:0.5px solid ${s.border}">${pub}</span>`;
  }).join('');
  const stats=[
    ['Publication type',p.publication],['Age range',p.age],['Gender profile',p.gender],
    ['Income (US)',p.incomeUS||'—'],...(p.incomeUK?[['Income (UK)',p.incomeUK]]:[]),
    ['Tech literacy',p.techLevel],['Trip frequency',p.tripFrequency],
  ].map(([l,v])=>`<div class="stat-row"><span class="stat-lbl">${l}</span><span class="stat-val">${v}</span></div>`).join('');
  const fields=[
    ['Core motivation',p.motivation],['Travel style',p.travelStyle],['Booking behaviour',p.bookingBehaviour],
    ['Pain points',p.painPoints],['Device & tool usage',p.deviceUsage],['Loyalty profile',p.loyaltyProfile],
  ].map(([l,v])=>`<div class="prof-section"><div class="prof-slbl">${l}</div><div class="prof-text">${v}</div></div>`).join('');
  const destUS=p.destinationsUS?p.destinationsUS.split(', ').map(d=>`<span class="dest-tag" style="background:${p.color}18;color:${p.color};border-color:${p.color}40">${d}</span>`).join(''):'';
  const destUK=p.destinationsUK?p.destinationsUK.split(', ').map(d=>`<span class="dest-tag" style="background:${p.color}18;color:${p.color};border-color:${p.color}40">${d}</span>`).join(''):'';

  return `<div class="hdr">
    <div class="eyebrow">Persona profile — ${seg?.name||''}</div>
    <div class="hdr-title">${p.title}</div>
    <div class="hdr-sub">Full profile from Audience Persona Matrix v5. Segment: ${seg?.name||''}.</div>
  </div>
  <div class="body">
    <div class="prof-grid">
      <div>
        <div class="prof-card">
          <div class="prof-card-top" style="border-bottom-color:${p.color}30">
            <div class="prof-icon">${p.icon}</div>
            <div class="prof-id" style="color:${p.color}">Persona #${p.id}</div>
            <div class="prof-name">${p.title}</div>
            <div class="prof-markets">${mkts}</div>
            ${pubs?`<div class="pub-badges">${pubs}</div>`:''}
          </div>
          <div class="prof-stats">${stats}</div>
        </div>
      </div>
      <div class="prof-detail">
        ${fields}
        <div class="prof-section"><div class="prof-slbl">Destinations</div>
          <div class="dest-grid">
            ${destUS?`<div class="dest-card"><div class="dest-lbl">US destinations</div><div class="dest-tags">${destUS}</div></div>`:''}
            ${destUK?`<div class="dest-card"><div class="dest-lbl">UK destinations</div><div class="dest-tags">${destUK}</div></div>`:''}
          </div>
        </div>
        ${p.notes?`<div class="notes-box"><div class="notes-lbl">Notes</div><div class="notes-txt">${p.notes}</div></div>`:''}
      </div>
    </div>
  </div>`;
}

function render(){
  let html=breadcrumb();
  if(VIEW==='orient') html+=renderOrient();
  else if(VIEW==='journey') html+=renderJourney();
  else if(VIEW==='persona') html+=renderPersona();
  document.getElementById('app').innerHTML=html;
}
render();
</script>
