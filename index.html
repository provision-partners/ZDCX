function bc(){
  if(VIEW==='orient') return '';
  if(VIEW==='journey') return `<div class="breadcrumb"><span class="bc-link" onclick="goOrient()">Overview</span><span class="bc-sep">›</span><span class="bc-cur">Customer Experience Journey — Value &amp; Deal Seekers</span></div>`;
  if(VIEW==='persona'){
    const p=PERSONAS.find(x=>x.id===activePersonaId);
    if(fromSeg==='value') return `<div class="breadcrumb"><span class="bc-link" onclick="goOrient()">Overview</span><span class="bc-sep">›</span><span class="bc-link" onclick="goJourney()">Journey — Value &amp; Deal Seekers</span><span class="bc-sep">›</span><span class="bc-cur">${p.title}</span></div>`;
    return `<div class="breadcrumb"><span class="bc-link" onclick="goOrient()">Overview</span><span class="bc-sep">›</span><span class="bc-cur">${p.title}</span></div>`;
  }
  return '';
}
function laneList(items,asObj){
  const lis=items.map(x=>asObj?`<li style="margin-bottom:3px">${x.text}${x.pl?PL:''}</li>`:`<li style="margin-bottom:3px">${x}</li>`).join('');
  return `<ul style="padding-left:13px;margin:0">${lis}</ul>`;
}
function laneCard(cls,label,items,asObj,extra){
  return `<div class="lane"><div class="lhd ${cls}">${label}</div>${extra||''}${laneList(items,asObj)}</div>`;
}
function renderOrient(){
  const stageData=[
    ['01','Discover','Make great travel feel like an obvious choice','First exposure within a trusted ZD context. A relevant option surfaces and a credible value signal draws the traveller in.',0],
    ['02','Plan & Compare','Simplify decisions and reduce uncertainty','The traveller researches and compares. Clarity on inclusions, pricing, and flexibility determines whether confidence builds or doubt wins.',1],
    ['03','Book','Turn intent into confident commitment','The booking flow converts intention into a confirmed reservation. Transparency and friction-free UX are critical to completion.',2],
    ['04','Pre-Trip','Keep confidence intact as the trip approaches','Proactive communication sustains confidence between booking and departure — preparation, confirmations, and timely reminders.',3],
    ['05','In-Trip','Stay focused on the experience, not the logistics','In normal operations the platform is invisible. Fast, accessible support is available but should rarely need to be used.',4],
    ['06','Disruption','Resolve issues seamlessly, if needed','When plans change, ZD owns the resolution. Proactive detection and managed rebooking differentiate from standard OTA models.',5],
    ['07','Post-Trip','Leave travellers feeling rewarded for choosing ZD','The trip is over but the relationship continues. Refund confirmation, a genuine review invitation, and a next deal signal loyalty is recognised.',6],
  ];
  const sc=stageData.map(([num,name,intent,desc,pi],i,arr)=>{
    const pal=SP[pi];
    return `<div class="stage-card" style="background:${pal.bg};border-color:${pal.border}">
      <div class="sc-hd" style="background:${pal.bg}"><span class="sc-num" style="color:${pal.num}">${num}</span><span class="sc-name" style="color:${pal.name}">${name}</span></div>
      <div class="sc-bd"><div class="sc-intent" style="color:${pal.intent}">"${intent}"</div><div class="sc-desc">${desc}</div></div>
    </div>${i<arr.length-1?'<div class="arr"><div class="arr-line"></div><div class="arr-tip"></div></div>':''}`;
  }).join('');
  const segCards=SEGS.map(s=>{
    const myP=PERSONAS.filter(p=>p.seg===s.id);
    const pips=myP.map(p=>s.journeyReady?`<span class="ppip live" onclick="event.stopPropagation();goPersona(${p.id},'${s.id}')">${p.title.replace('The ','')}</span>`:`<span class="ppip">${p.title.replace('The ','')}</span>`).join('');
    const props=s.props.map(pr=>`<span class="proppip" style="${ps(pr)}">${pr}</span>`).join('');
    const badge=s.journeyReady?'<span class="sbadge b-ready">Ready</span>':'<span class="sbadge b-soon">In development</span>';
    const cta=s.journeyReady?`<div class="seg-cta">View journey &#8594;</div>`:`<div class="seg-cta dim">Journey in development</div>`;
    return `<div class="seg-card${s.journeyReady?' live':'dim'}">
      <div class="seg-ch"><span class="sdot" style="background:${s.color}"></span><span class="seg-name">${s.name}</span>${badge}</div>
      <div class="seg-bd"${s.journeyReady?' onclick="goJourney()"':''}>
        <div class="seg-desc">${s.desc}</div><div class="ppips">${pips}</div><div class="proppips">${props}</div>${cta}
      </div></div>`;
  }).join('');
  return `<div class="hdr">
    <div class="hdr-title">ZD Travel — Customer Journey Framework</div>
    <div class="hdr-sub">An overview of the seven stages of the ZD travel customer journey. Detailed journeys are developed for each audience segment, reflecting how goals, emotions, and service requirements differ across the portfolio.</div>
    <div class="hdr-tags"><span class="htag">Draft for review</span><span class="htag">Shopping: RetailMeNot &middot; VoucherCodes</span><span class="htag">Technology: CNET &middot; ZDNet &middot; Mashable &middot; PCMag &middot; Lifehacker &middot; Spiceworks</span></div>
  </div>
  <div class="body">
    <div class="sec-label">Journey overview — seven stages</div>
    <div class="stages-scroll"><div class="stages-row">${sc}</div></div>
    <div class="bp-note" style="margin-top:14px;margin-bottom:24px"><strong>Service blueprint note.</strong> Each stage is documented at two levels: an <em>experience map</em> (goals, actions, emotions, and touchpoints from the traveller's perspective) and a <em>service blueprint</em> with seven lanes — on-stage delivery, backstage operations, technology and systems, people and process, delivery infrastructure and agreements, and two parallel ZD workstreams: editorial integration and advertiser/supplier management. Items marked <span class="pl-badge">Pre-launch</span> are setup tasks, not ongoing operational activities.</div>
    <div class="sec-label">Macro segment journeys — click a persona name to view their profile</div>
    <div class="seg-grid">${segCards}</div>
  </div>`;
}
function renderJourney(){
  const s=JSTAGES[jStage];const d=JDATA[s.id];const isD=s.special;const pal=SP[jStage];
  const myP=PERSONAS.filter(p=>p.seg==='value');
  const nav=JSTAGES.map((st,i)=>{const p=SP[i];const on=i===jStage;return `<button class="spill" style="background:${on?p.bg:'transparent'};border-color:${on?p.border:'#d0cec8'};color:${on?p.name:'#5a5956'};font-weight:${on?'500':'400'}" onclick="setJStage(${i})">${st.label}</button>${i<JSTAGES.length-1?'<span class="sarr">›</span>':''}`}).join('');
  const emo=Object.entries(d.emotions).map(([k,v])=>`<div class="emo-row"><span class="emo-n">${k}</span><div class="emo-tr"><div class="emo-fi" style="width:${v}%;background:${EMOCOLS[k]}"></div></div><span class="emo-pc">${v}</span></div>`).join('');
  const pips=myP.map(p=>`<span class="ppip live" onclick="goPersona(${p.id},'value')" style="cursor:pointer">${p.title.replace('The ','')}</span>`).join('');

  let main='';
  const EXP_LEGEND=`<div class="legend">
    <div class="legend-item"><span class="lsw" style="background:#eaf3de;border:0.5px solid #97c459"></span>Customer goals</div>
    <div class="legend-item"><span class="lsw" style="background:#e6f1fb;border:0.5px solid #85b7eb"></span>Customer actions</div>
    <div class="legend-item"><span class="lsw" style="background:#faeeda;border:0.5px solid #ef9f27"></span>Key touchpoints</div>
    <div class="legend-item"><span class="lsw" style="background:#eeedfe;border:0.5px solid #afa9ec"></span>Emotions</div>
  </div>`;
  const BP_LEGEND=`<div class="legend">
    <div class="legend-item"><span class="lsw" style="background:#e6f1fb;border:0.5px solid #85b7eb"></span>On stage</div>
    <div class="legend-item"><span class="lsw" style="background:#f1efe8;border:0.5px solid #d3d1c7"></span>Backstage ops</div>
    <div class="legend-item"><span class="lsw" style="background:#faeeda;border:0.5px solid #ef9f27"></span>Technology</div>
    <div class="legend-item"><span class="lsw" style="background:#eaf3de;border:0.5px solid #97c459"></span>People &amp; process</div>
    <div class="legend-item"><span class="lsw" style="background:#eeedfe;border:0.5px solid #afa9ec"></span>Delivery infrastructure</div>
    <div class="legend-item"><span class="lsw" style="background:#fff3e0;border:0.5px solid #ffb74d"></span>ZD Editorial</div>
    <div class="legend-item"><span class="lsw" style="background:#fce4ec;border:0.5px solid #f48fb1"></span>ZD Advertisers &amp; Suppliers</div>
    <div class="legend-item"><span class="pl-badge" style="margin-left:0">Pre-launch</span><span style="margin-left:4px">= setup task</span></div>
  </div>`;

  if(jView==='exp'){
    main=EXP_LEGEND+`
    <div class="g2" style="margin-bottom:8px">
      ${laneCard('l-goals','Customer goals',d.goals,false)}
      ${laneCard('l-actions','Customer actions',d.actions,false)}
    </div>
    <div class="lane" style="margin-bottom:8px"><div class="lhd l-touch">Key touchpoints</div>${laneList(d.touchpoints,false)}</div>`;
  } else {
    const peopleContent=`
      ${isD?`<div class="tgrid">${d.people.map((p,i)=>{const labs=['Tier 1','Tier 2','Tier 3'];const nms=['Self-service &amp; AI','General agents','Specialist disruption'];const pt=p.split(':');return `<div class="tc"><div class="tnum">${labs[i]}</div><div class="tnm">${nms[i]}</div><div class="tds">${pt.length>1?pt[1].trim():p}</div></div>`;}).join('')}</div><div class="sub-hd">Process</div>${laneList(d.process,false)}`:`<div class="sub-hd" style="margin-top:0">Responsibilities</div>${laneList(d.people,false)}<div class="sub-hd">Process</div>${laneList(d.process,false)}`}`;

    main=BP_LEGEND+`
    <div class="g2" style="margin-bottom:8px">
      ${laneCard('l-front','On stage — visible to traveller',d.front,false)}
      ${laneCard('l-back','Backstage — operations',d.back,false)}
    </div>
    <div class="g2" style="margin-bottom:8px">
      ${laneCard('l-tech','Technology &amp; systems',d.tech,false)}
      <div class="lane"><div class="lhd l-people">People &amp; process</div>${peopleContent}</div>
    </div>
    <div class="lane full" style="margin-bottom:8px"><div class="lhd l-delivery">Delivery infrastructure &amp; agreements</div>${laneList(d.delivery,false)}</div>
    <div class="g2b">
      <div class="lane"><div class="lhd l-ed">ZD Editorial</div><div class="parallel-note">Parallel workstream</div>${laneList(d.editorial,true)}</div>
      <div class="lane"><div class="lhd l-as">ZD Advertisers &amp; Suppliers</div><div class="parallel-note">Parallel workstream</div>${laneList(d.advertiser,true)}</div>
    </div>`;
  }

  return `<div class="hdr">
    <div class="hdr-title">Customer Experience Journey — Value &amp; Deal Seekers</div>
    <div class="hdr-sub">RetailMeNot (US) &middot; VoucherCodes (UK) &middot; Click a persona name to view their full profile</div>
    <div class="hdr-tags" style="margin-top:8px">${pips}</div>
  </div>
  <div class="body">
    <div class="stage-nav">${nav}</div>
    <div class="vbar">
      <span class="vlabel">View</span>
      <button class="vbtn${jView==='exp'?' on':''}" onclick="setJView('exp')">Experience map — frontstage</button>
      <button class="vbtn${jView==='bp'?' on':''}" onclick="setJView('bp')">Service blueprint — backstage</button>
    </div>
    <div class="jlayout">
      <div class="jsb">
        <div class="slabel2" style="margin-bottom:6px">Stage intent</div>
        <div class="intent-strip" style="border-left-color:${pal.border};background:${pal.bg}"><div class="intent-txt" style="color:${pal.intent}">"${s.intent}"</div></div>
        <div class="slabel2" style="margin-bottom:6px">Emotional temperature</div>
        ${emo}
        <div class="slabel2" style="margin-top:10px;margin-bottom:5px">Properties</div>
        <div class="si">RetailMeNot (US)</div><div class="si">VoucherCodes (UK)</div>
      </div>
      <div>
        <div class="stitle" style="color:${pal.name}">${s.label}${isD?' — Disruption Handling':''}</div>
        <div class="sdesc">${d.desc}</div>
        ${isD&&d.disruptNote?`<div class="dbox"><div class="dlbl">Design note — differentiation opportunity</div><div class="dtxt">${d.disruptNote}</div></div>`:''}
        ${main}
      </div>
    </div>
  </div>`;
}
function renderPersona(){
  const p=PERSONAS.find(x=>x.id===activePersonaId);if(!p) return '<div class="body"><p>Not found.</p></div>';
  const seg=SEGS.find(s=>s.id===p.seg);
  const mkts=p.markets.map(m=>`<span class="mkt-badge ${m==='US'?'mkt-us':'mkt-uk'}">${m}</span>`).join('');
  const pubs=[...p.pubAlignment,...p.voucherProps].map(pub=>{const s=PUB_STYLE[pub]||{bg:'#f1efe8',color:'#5a5956',border:'#d3d1c7'};return `<span class="pub-badge" style="background:${s.bg};color:${s.color};border:0.5px solid ${s.border}">${pub}</span>`;}).join('');
  const stats=[['Publication type',p.publication],['Age range',p.age],['Gender profile',p.gender],['Income (US)',p.incomeUS||'—'],...(p.incomeUK?[['Income (UK)',p.incomeUK]]:[]),['Tech literacy',p.techLevel],['Trip frequency',p.tripFrequency]].map(([l,v])=>`<div class="stat-row"><span class="stat-lbl">${l}</span><span class="stat-val">${v}</span></div>`).join('');
  const fields=[['Core motivation',p.motivation],['Travel style',p.travelStyle],['Booking behaviour',p.bookingBehaviour],['Pain points',p.painPoints],['Device & tool usage',p.deviceUsage],['Loyalty profile',p.loyaltyProfile]].map(([l,v])=>`<div class="prof-section"><div class="prof-slbl">${l}</div><div class="prof-text">${v}</div></div>`).join('');
  const dUS=p.destinationsUS?p.destinationsUS.split(', ').map(d=>`<span class="dest-tag" style="background:${p.color}18;color:${p.color};border-color:${p.color}40">${d}</span>`).join(''):'';
  const dUK=p.destinationsUK?p.destinationsUK.split(', ').map(d=>`<span class="dest-tag" style="background:${p.color}18;color:${p.color};border-color:${p.color}40">${d}</span>`).join(''):'';
  return `<div class="hdr">
    <div class="hdr-title">Persona Profile — ${p.title}</div>
    <div class="hdr-sub">Audience Persona Matrix v5 &middot; Segment: ${seg?.name||''}</div>
  </div>
  <div class="body">
    <div class="prof-grid">
      <div><div class="prof-card">
        <div class="prof-card-top" style="border-bottom-color:${p.color}30">
          <div class="prof-icon">${p.icon}</div>
          <div class="prof-id" style="color:${p.color}">Persona #${p.id}</div>
          <div class="prof-name">${p.title}</div>
          <div class="prof-markets">${mkts}</div>
          ${pubs?`<div class="pub-badges">${pubs}</div>`:''}
        </div>
        <div class="prof-stats">${stats}</div>
      </div></div>
      <div class="prof-detail">
        ${fields}
        <div class="prof-section"><div class="prof-slbl">Destinations</div>
          <div class="dest-grid">
            ${dUS?`<div class="dest-card"><div class="dest-lbl">US destinations</div><div class="dest-tags">${dUS}</div></div>`:''}
            ${dUK?`<div class="dest-card"><div class="dest-lbl">UK destinations</div><div class="dest-tags">${dUK}</div></div>`:''}
          </div>
        </div>
        ${p.notes?`<div class="notes-box"><div class="notes-lbl">Notes</div><div class="notes-txt">${p.notes}</div></div>`:''}
      </div>
    </div>
  </div>`;
}
function render(){
  let html=bc();
  if(VIEW==='orient') html+=renderOrient();
  else if(VIEW==='journey') html+=renderJourney();
  else if(VIEW==='persona') html+=renderPersona();
  document.getElementById('app').innerHTML=html;
}
render();
</script>
